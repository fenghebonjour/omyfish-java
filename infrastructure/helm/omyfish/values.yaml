global:
  imageRegistry: ""
  imagePullSecrets: []

# Each entry is deployed as a Deployment + Service.
# Keys match Kubernetes resource names (kebab-case).
services:
  api-gateway:
    enabled: true
    replicas: 2
    image:
      repository: omyfish/api-gateway
      tag: "latest"
      pullPolicy: IfNotPresent
    port: 8080
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi
    autoscaling:
      enabled: false
    # Additional env vars beyond the shared ConfigMap + Secret
    env:
      - name: IDENTITY_SERVICE_URL
        value: "http://identity-service:8080"
      - name: SPECIES_SERVICE_URL
        value: "http://species-service:8080"
      - name: OBSERVATION_SERVICE_URL
        value: "http://observation-service:8080"
      - name: NOTIFICATION_SERVICE_URL
        value: "http://notification-service:8080"

  identity-service:
    enabled: true
    replicas: 2
    image:
      repository: omyfish/identity-service
      tag: "latest"
      pullPolicy: IfNotPresent
    port: 8080
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi
    autoscaling:
      enabled: false
    env: []

  species-service:
    enabled: true
    replicas: 2
    image:
      repository: omyfish/species-service
      tag: "latest"
      pullPolicy: IfNotPresent
    port: 8080
    resources:
      requests:
        cpu: 500m
        memory: 1Gi
      limits:
        cpu: 1000m
        memory: 2Gi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 20
      targetCPUUtilizationPercentage: 70
    env:
      - name: OMYFISH_AI_SERVICE_URL
        value: "http://ai-service:8000"

  observation-service:
    enabled: true
    replicas: 2
    image:
      repository: omyfish/observation-service
      tag: "latest"
      pullPolicy: IfNotPresent
    port: 8080
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi
    autoscaling:
      enabled: true
      minReplicas: 2
      maxReplicas: 10
      targetCPUUtilizationPercentage: 70
    env: []

  notification-service:
    enabled: true
    replicas: 1
    image:
      repository: omyfish/notification-service
      tag: "latest"
      pullPolicy: IfNotPresent
    port: 8080
    resources:
      requests:
        cpu: 250m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi
    autoscaling:
      enabled: false
    env: []

  ai-service:
    enabled: true
    replicas: 1
    image:
      repository: omyfish/ai-service
      tag: "latest"
      pullPolicy: IfNotPresent
    port: 8000
    resources:
      requests:
        cpu: 1000m
        memory: 4Gi
      limits:
        cpu: 2000m
        memory: 8Gi
    autoscaling:
      enabled: false
    env:
      - name: MODEL_PATH
        value: /checkpoints/best.pt
    # Override probes for non-Spring services
    readinessProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 60
      periodSeconds: 15
      failureThreshold: 3
    livenessProbe:
      httpGet:
        path: /health
        port: 8000
      initialDelaySeconds: 120
      periodSeconds: 30
      failureThreshold: 3

  frontend:
    enabled: true
    replicas: 2
    image:
      repository: omyfish/frontend
      tag: "latest"
      pullPolicy: IfNotPresent
    port: 3000
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 500m
        memory: 512Mi
    autoscaling:
      enabled: false
    env:
      - name: NEXT_PUBLIC_API_URL
        value: "https://api.omyfish.io"
    readinessProbe:
      httpGet:
        path: /api/health
        port: 3000
      initialDelaySeconds: 15
      periodSeconds: 10
      failureThreshold: 3
    livenessProbe:
      httpGet:
        path: /api/health
        port: 3000
      initialDelaySeconds: 30
      periodSeconds: 15
      failureThreshold: 3

# Shared config injected into all Java service containers
config:
  datasourceUrl: "jdbc:postgresql://{{ .Release.Name }}-postgresql:5432/omyfish"
  rabbitmqHost: "{{ .Release.Name }}-rabbitmq"
  minioEndpoint: "http://{{ .Release.Name }}-minio:9000"
  otelEndpoint: "http://otel-collector:4317"
  nextPublicApiUrl: "https://api.omyfish.io"

# Secrets — override via --set or a values override file; never commit real values
secrets:
  datasourceUsername: "omyfish"
  datasourcePassword: "changeme-in-prod"
  rabbitmqUsername: "omyfish"
  rabbitmqPassword: "changeme-in-prod"
  minioAccessKey: "omyfish"
  minioSecretKey: "changeme-in-prod"
  jwtSecret: "CHANGE_ME_IN_PRODUCTION"

ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "20m"
    cert-manager.io/cluster-issuer: letsencrypt-prod
  apiHost: api.omyfish.io
  wwwHost: omyfish.io
  tls:
    enabled: true

postgresql:
  enabled: true
  auth:
    database: omyfish
    username: omyfish
    password: changeme-in-prod
  primary:
    persistence:
      size: 20Gi

rabbitmq:
  enabled: true
  auth:
    username: omyfish
    password: changeme-in-prod
  persistence:
    size: 8Gi
  replicaCount: 3

minio:
  enabled: true
  auth:
    rootUser: omyfish
    rootPassword: changeme-in-prod
  persistence:
    size: 50Gi
