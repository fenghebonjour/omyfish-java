{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: omyfish-ingress
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "omyfish.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.ingress.annotations | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - secretName: omyfish-api-tls
      hosts:
        - {{ .Values.ingress.apiHost }}
    - secretName: omyfish-www-tls
      hosts:
        - {{ .Values.ingress.wwwHost }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.apiHost }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8080
    - host: {{ .Values.ingress.wwwHost }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
{{- end }}
