spring:
  application:
    name: api-gateway
  codec:
    max-in-memory-size: 20MB
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: false
      routes:
        - id: identity-service
          uri: ${IDENTITY_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/**,/api/users/**
        - id: species-service
          uri: ${SPECIES_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/species/**
        - id: observation-service
          uri: ${OBSERVATION_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/v1/observations/**

jwt:
  secret: ${JWT_SECRET:dev-secret-change-in-production-32b}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    export:
      prometheus:
        enabled: true
