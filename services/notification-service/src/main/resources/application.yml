spring:
  application:
    name: notification-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/omyfish}
    username: ${SPRING_DATASOURCE_USERNAME:omyfish}
    password: ${SPRING_DATASOURCE_PASSWORD:omyfish_dev}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    table: flyway_schema_history_notification
    baseline-on-migrate: true
    baseline-version: "0"
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: 5672
    username: ${SPRING_RABBITMQ_USERNAME:omyfish}
    password: ${SPRING_RABBITMQ_PASSWORD:omyfish_dev}

server:
  port: 8080

omyfish:
  rabbitmq:
    queues:
      observation-created: omyfish.notifications.observation-created

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    export:
      prometheus:
        enabled: true
