spring:
  application:
    name: identity-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/omyfish}
    username: ${SPRING_DATASOURCE_USERNAME:omyfish}
    password: ${SPRING_DATASOURCE_PASSWORD:omyfish_dev}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    table: flyway_schema_history_identity

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:dev-secret-change-in-production-x32}
  expiration-ms: 86400000

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    export:
      prometheus:
        enabled: true
