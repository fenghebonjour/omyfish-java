spring:
  application:
    name: identity-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/omyfish}
    username: ${SPRING_DATASOURCE_USERNAME:omyfish}
    password: ${SPRING_DATASOURCE_PASSWORD:omyfish_dev}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    table: flyway_schema_history_identity

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:dev-secret-change-in-production-x32}
  expiration-ms: 86400000
  refresh-expiration-ms: 2592000000

# Stripe (test keys) — billing endpoints return 503 until these are set
stripe:
  secret-key: ${STRIPE_SECRET_KEY:}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
  price-monthly: ${STRIPE_PRICE_MONTHLY:}   # 5 CAD/month
  price-yearly: ${STRIPE_PRICE_YEARLY:}     # 29 CAD/year

app:
  base-url: ${APP_BASE_URL:http://localhost:3000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    export:
      prometheus:
        enabled: true
