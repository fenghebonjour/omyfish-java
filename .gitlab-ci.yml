stages:
  - build
  - test
  - docker
  - deploy

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"
  MAVEN_CLI_OPTS: "--batch-mode --errors --fail-at-end"
  DOCKER_REGISTRY: $CI_REGISTRY
  IMAGE_TAG: $CI_COMMIT_SHORT_SHA

cache:
  paths:
    - .m2/repository/

# ─── Build ────────────────────────────────────────────────────────────────────

build:
  stage: build
  image: maven:3.9-eclipse-temurin-21
  script:
    - mvn $MAVEN_CLI_OPTS clean package -DskipTests
  artifacts:
    paths:
      - "*/target/*.jar"
      - "services/*/target/*.jar"
    expire_in: 1 hour

# ─── Test ─────────────────────────────────────────────────────────────────────

unit-test:
  stage: test
  image: maven:3.9-eclipse-temurin-21
  script:
    - mvn $MAVEN_CLI_OPTS test
  artifacts:
    reports:
      junit:
        - "**/target/surefire-reports/TEST-*.xml"

integration-test:
  stage: test
  image: maven:3.9-eclipse-temurin-21
  services:
    - postgres:16
    - rabbitmq:3.13-management
  variables:
    POSTGRES_DB: omyfish_test
    POSTGRES_USER: omyfish
    POSTGRES_PASSWORD: omyfish_test
  script:
    - mvn $MAVEN_CLI_OPTS verify -Pintegration-tests
  artifacts:
    reports:
      junit:
        - "**/target/failsafe-reports/TEST-*.xml"

# ─── Docker ───────────────────────────────────────────────────────────────────

.docker-build: &docker-build
  stage: docker
  image: docker:24
  services:
    - docker:24-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  only:
    - main
    - develop

docker-species-service:
  <<: *docker-build
  script:
    - docker build -t $DOCKER_REGISTRY/omyfish/species-service:$IMAGE_TAG ./services/species-service
    - docker push $DOCKER_REGISTRY/omyfish/species-service:$IMAGE_TAG

docker-observation-service:
  <<: *docker-build
  script:
    - docker build -t $DOCKER_REGISTRY/omyfish/observation-service:$IMAGE_TAG ./services/observation-service
    - docker push $DOCKER_REGISTRY/omyfish/observation-service:$IMAGE_TAG

docker-api-gateway:
  <<: *docker-build
  script:
    - docker build -t $DOCKER_REGISTRY/omyfish/api-gateway:$IMAGE_TAG ./services/api-gateway
    - docker push $DOCKER_REGISTRY/omyfish/api-gateway:$IMAGE_TAG

docker-ai-service:
  <<: *docker-build
  script:
    - docker build -t $DOCKER_REGISTRY/omyfish/ai-service:$IMAGE_TAG ./services/ai-service
    - docker push $DOCKER_REGISTRY/omyfish/ai-service:$IMAGE_TAG

# ─── Deploy ───────────────────────────────────────────────────────────────────

deploy-staging:
  stage: deploy
  image: dtzar/helm-kubectl:3.15
  environment:
    name: staging
    url: https://staging.omyfish.io
  script:
    - helm upgrade --install omyfish ./infrastructure/helm/omyfish
        --namespace omyfish
        --create-namespace
        --set image.speciesService.tag=$IMAGE_TAG
        --set image.observationService.tag=$IMAGE_TAG
        --set image.apiGateway.tag=$IMAGE_TAG
        --values ./infrastructure/helm/omyfish/values.yaml
        --atomic
        --timeout 5m
  only:
    - develop

deploy-production:
  stage: deploy
  image: dtzar/helm-kubectl:3.15
  environment:
    name: production
    url: https://omyfish.io
  script:
    - helm upgrade --install omyfish ./infrastructure/helm/omyfish
        --namespace omyfish-prod
        --create-namespace
        --set image.speciesService.tag=$IMAGE_TAG
        --set image.observationService.tag=$IMAGE_TAG
        --set image.apiGateway.tag=$IMAGE_TAG
        --values ./infrastructure/helm/omyfish/values.yaml
        --values ./infrastructure/helm/omyfish/values-prod.yaml
        --atomic
        --timeout 10m
  only:
    - main
  when: manual
